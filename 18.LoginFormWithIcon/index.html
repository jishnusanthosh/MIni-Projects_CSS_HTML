<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form with Icons</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <script
        src="https://kit.fontawesome.com/1d4bb831de.js"
        crossorigin="anonymous">
    </script>
</head>

<body>

    <div class="main_div">

        <div class="title">
            Login Form
        </div>

        <!-- Social Icons -->

        <div class="social_icons">

            <a href="#">
                <i class="fab fa-facebook-f"></i>
                <span>Facebook</span>
            </a>

            <a href="#">
                <i class="fab fa-twitter"></i>
                <span>Twitter</span>
            </a>

        </div>

        <!-- Form -->

        <form action="#">

            <div class="input_box">

                <input
                    type="text"
                    placeholder="Email or Phone"
                    required>

                <div class="icon">
                    <i class="fa fa-user"></i>
                </div>

            </div>

            <div class="input_box">

                <input
                    type="password"
                    placeholder="Password"
                    required>

                <div class="icon">
                    <i class="fa fa-lock"></i>
                </div>

            </div>

            <!-- Remember -->

            <div class="option_div">

                <div class="check_box">

                    <input type="checkbox" id="remember">

                    <label for="remember">
                        Remember Me
                    </label>

                </div>

                <div class="forget_div">

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

            </div>

            <!-- Login Button -->

            <div class="input_box button">

                <input
                    type="submit"
                    value="Login">

            </div>

        </form>

        <!-- Sign Up -->

        <div class="sign_up">

            Not a member?
            <a href="#">
                Sign Up Now
            </a>

        </div>

    </div>

</body>
</html>
